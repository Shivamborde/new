<!DOCTYPE html>
<html>

<head>
    <title>Admin - Ellora Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">📊 Enquiry Data</h1>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="text-lg font-semibold text-gray-700">Total Enquiries</h3>
                <p id="totalCount" class="text-3xl font-bold text-blue-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="text-lg font-semibold text-gray-700">New</h3>
                <p id="newCount" class="text-3xl font-bold text-yellow-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="text-lg font-semibold text-gray-700">Contacted</h3>
                <p id="contactedCount" class="text-3xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="text-lg font-semibold text-gray-700">Converted</h3>
                <p id="convertedCount" class="text-3xl font-bold text-purple-600">0</p>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="mb-4 space-x-2">
            <button onclick="loadEnquiries('all')" class="bg-blue-500 text-white px-4 py-2 rounded">All</button>
            <button onclick="loadEnquiries('new')" class="bg-yellow-500 text-white px-4 py-2 rounded">New</button>
            <button onclick="loadEnquiries('contacted')"
                class="bg-green-500 text-white px-4 py-2 rounded">Contacted</button>
            <button onclick="loadEnquiries('converted')"
                class="bg-purple-500 text-white px-4 py-2 rounded">Converted</button>
        </div>

        <!-- Search -->
        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="Search by name, email, or phone..."
                class="w-full p-2 border rounded" onkeyup="searchEnquiries()">
        </div>

        <!-- Enquiries Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Persons</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="enquiriesTable" class="divide-y divide-gray-200">
                    <!-- Data will load here -->
                </tbody>
            </table>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-4">
            <i class="fas fa-spinner fa-spin text-blue-500"></i> Loading...
        </div>

        <!-- No Data -->
        <div id="noData" class="text-center py-8 hidden">
            <p class="text-gray-500">No enquiries found</p>
        </div>
    </div>

    <script>
        let allEnquiries = [];

        // Load all enquiries
        async function loadEnquiries(filter = 'all') {
            showLoading(true);

            try {
                const url = filter === 'all'
                    ? '/api/enquiries'
                    : `/api/enquiries?status=${filter}`;

                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                    allEnquiries = result.data;
                    displayEnquiries(result.data);
                    updateStats(result.data);
                }
            } catch (error) {
                console.error('Error loading enquiries:', error);
                alert('Failed to load data');
            } finally {
                showLoading(false);
            }
        }

        // Display enquiries in table
        function displayEnquiries(enquiries) {
            const tbody = document.getElementById('enquiriesTable');
            const noData = document.getElementById('noData');

            if (enquiries.length === 0) {
                tbody.innerHTML = '';
                noData.classList.remove('hidden');
                return;
            }

            noData.classList.add('hidden');

            tbody.innerHTML = enquiries.map(enquiry => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        ${new Date(enquiry.createdAt).toLocaleDateString()}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                        ${enquiry.fullName}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${enquiry.phoneNumber}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${enquiry.email}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs">
                            ${enquiry.enquiryType}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${enquiry.numberOfPersons || 1}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 rounded text-xs ${getStatusClass(enquiry.status)}">
                            ${enquiry.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewEnquiry('${enquiry._id}')" class="text-blue-600 hover:text-blue-900 mr-2">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="updateStatus('${enquiry._id}', 'contacted')" class="text-green-600 hover:text-green-900 mr-2">
                            <i class="fas fa-phone"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Update statistics
        function updateStats(enquiries) {
            const total = enquiries.length;
            const newCount = enquiries.filter(e => e.status === 'new').length;
            const contactedCount = enquiries.filter(e => e.status === 'contacted').length;
            const convertedCount = enquiries.filter(e => e.status === 'converted').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('newCount').textContent = newCount;
            document.getElementById('contactedCount').textContent = contactedCount;
            document.getElementById('convertedCount').textContent = convertedCount;
        }

        // Get status CSS class
        function getStatusClass(status) {
            const classes = {
                'new': 'bg-yellow-100 text-yellow-800',
                'contacted': 'bg-green-100 text-green-800',
                'converted': 'bg-purple-100 text-purple-800',
                'rejected': 'bg-red-100 text-red-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        // Search enquiries
        function searchEnquiries() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            if (!searchTerm) {
                displayEnquiries(allEnquiries);
                return;
            }

            const filtered = allEnquiries.filter(enquiry =>
                enquiry.fullName.toLowerCase().includes(searchTerm) ||
                enquiry.email.toLowerCase().includes(searchTerm) ||
                enquiry.phoneNumber.includes(searchTerm)
            );

            displayEnquiries(filtered);
        }

        // View single enquiry details
        async function viewEnquiry(id) {
            try {
                const response = await fetch(`https://ellora-1.onrender.com/api/enquiries/${id}`);
                const result = await response.json();

                if (result.success) {
                    const enquiry = result.data;
                    alert(`
Enquiry Details:
----------------
Name: ${enquiry.fullName}
Phone: ${enquiry.phoneNumber}
Email: ${enquiry.email}
Type: ${enquiry.enquiryType}
Date: ${new Date(enquiry.createdAt).toLocaleString()}
Persons: ${enquiry.numberOfPersons}
Destination: ${enquiry.destination || 'Not specified'}
Message: ${enquiry.message}
                    `);
                }
            } catch (error) {
                console.error('Error viewing enquiry:', error);
            }
        }

        // Update enquiry status
        async function updateStatus(id, newStatus) {
            if (confirm('Mark as contacted?')) {
                try {
                    const response = await fetch(`/api/enquiries/${id}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });

                    const result = await response.json();

                    if (result.success) {
                        alert('Status updated successfully!');
                        loadEnquiries('all'); // Refresh
                    }
                } catch (error) {
                    console.error('Error updating status:', error);
                }
            }
        }

        // Show/hide loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadEnquiries('all');
        });
    </script>
</body>

</html>
